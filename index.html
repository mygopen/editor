<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 事實查核文章產生器</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: #2c3e50; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #34495e; }
        input[type="password"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-family: inherit; }
        textarea { height: 120px; resize: vertical; }
        button { background-color: #27ae60; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 5px; cursor: pointer; width: 100%; transition: background 0.3s; }
        button:hover { background-color: #2ecc71; }
        button:disabled { background-color: #95a5a6; cursor: not-allowed; }
        .output-group { margin-top: 30px; }
        .output-group textarea { height: 300px; background-color: #2c3e50; color: #ecf0f1; font-family: monospace; }
        .status { margin-top: 10px; font-weight: bold; text-align: center; color: #e74c3c; }
    </style>
</head>
<body>

<div class="container">
    <h1>🔍 AI 事實查核文章產生器</h1>
    
    <div class="form-group">
        <label for="apiKey">🔑 Google Gemini API Key (需至 Google AI Studio 免費申請)</label>
        <input type="password" id="apiKey" placeholder="請輸入您的 API Key (僅儲存於本地端瀏覽器)">
    </div>

    <div class="form-group">
        <label for="rumorText">🚨 網傳謠言本體</label>
        <textarea id="rumorText" placeholder="請貼上網路上流傳的假訊息文字或連結..."></textarea>
    </div>

    <div class="form-group">
        <label for="truthText">✅ 查證澄清資訊 (你查到的事實)</label>
        <textarea id="truthText" placeholder="請貼上事實真相、官方澄清內容或證據網址..."></textarea>
    </div>

    <button id="generateBtn" onclick="generateReport()">🚀 一鍵生成 Blogger HTML</button>
    <div id="statusMessage" class="status"></div>

    <div class="output-group">
        <label for="outputHtml">📝 生成的 HTML 與 LINE 轉傳短文 (請複製貼上至 Blogger)</label>
        <textarea id="outputHtml" readonly placeholder="AI 生成的 HTML 程式碼會顯示在這裡..."></textarea>
    </div>
</div>

<script>
    // 頁面載入時嘗試讀取儲存的 API Key
    document.addEventListener("DOMContentLoaded", () => {
        const savedKey = localStorage.getItem('geminiApiKey');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
    });

    async function generateReport() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const rumor = document.getElementById('rumorText').value.trim();
        const truth = document.getElementById('truthText').value.trim();
        const btn = document.getElementById('generateBtn');
        const status = document.getElementById('statusMessage');
        const output = document.getElementById('outputHtml');

        if (!apiKey || !rumor || !truth) {
            status.textContent = "⚠️ 請填寫 API Key、謠言本體與澄清資訊！";
            return;
        }

        // 儲存 API Key 方便下次使用
        localStorage.setItem('geminiApiKey', apiKey);

        btn.disabled = true;
        btn.textContent = "⚙️ AI 正在撰寫查核報告中，請稍候...";
        status.textContent = "";
        output.value = "";

        // 這是我們剛剛設定的專屬 Prompt
        const prompt = `
你是一位專業的事實查核特助。請根據以下我提供的「謠言本體」與「查證澄清資訊」，嚴格按照下方規定的 HTML 樣板，產出一篇適合發布在 Blogger 的事實查核文章。

【語氣與規範】
1. 保持客觀、中立、嚴謹，不帶主觀情緒。現在是 2026 年。
2. 禁用「總結來說」、「值得注意的是」等 AI 套話。
3. 必須將我提供的澄清網址或來源，精準填入 HTML 的 <a href="..."> 標籤中。
4. 請直接輸出 HTML 程式碼與結尾的 LINE 轉傳短文，不要加上 \`\`\`html 標記。

【謠言本體】：
${rumor}

【查證澄清資訊】：
${truth}

【HTML 樣板結構與填寫規範】：
<div class="quote_style"><h3 style="text-align: center;">你可以先知道：</h3>
（1）[填入重點一：用一句話點出謠言的破綻]
<br /><br />
（2）[填入重點二：用一句話點出官方或真實情況的說明]
</div><br />

<div class="intro_words">[填入前言：約 50-80 字描述網傳訊息與總結結果]</div>

<div class="separator" style="clear: both;"><a href="" style="display: block; padding: 1em 0px; text-align: center;"><img alt="" border="0" src="" /></a></div>
<h2>[填入標題：謠言宣稱的短語問句？事實短評！]</h2>
<br />原始謠傳版本：<br />
<blockquote class="tr_bq">[貼上謠言本體]</blockquote>
<br />
並在社群平台流傳：
<br /><br /><img src="" /> <br /><br />

查證解釋：<br />
<blockquote class="yestrue">
<h3 style="text-align: left;">網傳訊息原始出處為何？</h3><br />
[根據查證資訊說明來源破綻，適時使用 <b><span style="color: red;">重點字</span></b>]

<h3 style="text-align: left;">實際情況？</h3><br />
[詳細說明澄清的內容]

<h3 style="text-align: left;">結論</h3><br />
[總結說明網傳訊息為何沒有依據]
</blockquote>
<br />資料來源：<br /><br />
[來源名稱] - <a href="[來源網址]">[來源文章標題]</a><br />

---
❌【假訊息提醒】[100字以內的 LINE 轉傳精簡闢謠文]
        `;

        try {
            // 呼叫 Google Gemini API
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro-latest:generateContent?key=${apiKey}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    contents: [{ parts: [{ text: prompt }] }],
                    generationConfig: { temperature: 0.2 } // 降低溫度讓事實查核更嚴謹
                })
            });

            if (!response.ok) throw new Error("API 呼叫失敗，請檢查 API Key 是否正確。");

            const data = await response.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            // 清理可能附帶的 markdown 標籤
            output.value = aiText.replace(/```html/g, '').replace(/```/g, '').trim();
            status.style.color = "#27ae60";
            status.textContent = "✅ 生成成功！請複製下方內容。";

        } catch (error) {
            status.style.color = "#e74c3c";
            status.textContent = error.message;
        } finally {
            btn.disabled = false;
            btn.textContent = "🚀 一鍵生成 Blogger HTML";
        }
    }
</script>

</body>
</html>
